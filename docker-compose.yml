services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:9092:9092"
    environment:
       KAFKA_BROKER_ID: 1
       KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST_ADVERTISED_LISTENER:-127.0.0.1:9092},PLAINTEXT_INTERNAL://${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:29092}
       KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
       KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command:
      - /bin/bash
      - -ec
      - |
        kafka-topics \
          --bootstrap-server ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:29092} \
          --create \
          --if-not-exists \
          --topic ${KAFKA_TOPIC_NAME:?KAFKA_TOPIC_NAME is required} \
          --partitions ${KAFKA_TOPIC_PARTITIONS:-3} \
          --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}

  postgres:
    image: postgres:16.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-migrate:
    image: postgres:16.2-alpine
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${DB_NAME:?DB_NAME is required}
      PGUSER: ${DB_USER:?DB_USER is required}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - ./database/migrations:/migrations:ro
    command:
      - /bin/sh
      - -ec
      - |
        psql -v ON_ERROR_STOP=1 -c "CREATE TABLE IF NOT EXISTS schema_migrations (version TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP);"
        for migration in /migrations/*.sql; do
          version="$$(basename "$$migration")"
          applied="$$(psql -tAc "SELECT 1 FROM schema_migrations WHERE version = '$$version';")"
          if [ "$$applied" = "1" ]; then
            echo "Skipping already applied migration: $$version"
          else
            echo "Applying migration: $$version"
            psql -v ON_ERROR_STOP=1 -f "$$migration"
            psql -v ON_ERROR_STOP=1 -c "INSERT INTO schema_migrations (version) VALUES ('$$version');"
          fi
        done

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  kafka-ui:
     image: provectuslabs/kafka-ui:latest
     restart: unless-stopped
     ports:
       - "${HOST_BIND_ADDRESS:-127.0.0.1}:8080:8080"
     environment:
       KAFKA_CLUSTERS_0_NAME: local
       KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:29092}
       KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
     depends_on:
       kafka-init:
         condition: service_completed_successfully

  producer:
    build: .
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC_NAME: ${KAFKA_TOPIC_NAME:?KAFKA_TOPIC_NAME is required}
      SIMULATION_INTERVAL_SECONDS: ${SIMULATION_INTERVAL_SECONDS:-1.0}
      TOTAL_CUSTOMERS: ${TOTAL_CUSTOMERS:-5}
      KAFKA_PRODUCER_ACKS: ${KAFKA_PRODUCER_ACKS:-all}
      KAFKA_PRODUCER_ENABLE_IDEMPOTENCE: ${KAFKA_PRODUCER_ENABLE_IDEMPOTENCE:-true}
      KAFKA_PRODUCER_RETRIES: ${KAFKA_PRODUCER_RETRIES:-10}
      KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS: ${KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:-120000}
      KAFKA_PRODUCER_LINGER_MS: ${KAFKA_PRODUCER_LINGER_MS:-20}
      PRODUCER_BUFFER_RETRY_BACKOFF_SECONDS: ${PRODUCER_BUFFER_RETRY_BACKOFF_SECONDS:-1.0}
    command: python -m producers.app
    healthcheck:
      test: ["CMD", "python", "-m", "core.healthcheck", "producer"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  consumer:
    build: .
    restart: unless-stopped
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC_NAME: ${KAFKA_TOPIC_NAME:?KAFKA_TOPIC_NAME is required}
      CONSUMER_RETRY_BACKOFF_SECONDS: ${CONSUMER_RETRY_BACKOFF_SECONDS:-2.0}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-5}
      DB_CONNECT_BACKOFF_SECONDS: ${DB_CONNECT_BACKOFF_SECONDS:-2.0}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    command: python -m consumers.app
    healthcheck:
      test: ["CMD", "python", "-m", "core.healthcheck", "consumer"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
